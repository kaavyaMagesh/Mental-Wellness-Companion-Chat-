openapi: 3.0.3
info:
  title: InnerWhispers Chat API
  version: 1.0.0
  description: API specifications for the InnerWhispers AI chat system.
servers:
  - url: https://api.innerwhispers.com/v1
    description: Production Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ChatSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
        system_context:
          type: string
        risk_level:
          type: string
        is_active:
          type: boolean
        last_message_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        sender:
          type: string
          enum: [user, assistant, system]
        message:
          type: string
        tokens_used:
          type: integer
        risk_flag:
          type: boolean
        metadata:
          type: object
          description: Optional JSON metadata (e.g. reasoning steps, agent name)
          additionalProperties: true
        created_at:
          type: string
          format: date-time
security:
  - bearerAuth: []
paths:
  /api/chat/session:
    get:
      summary: List user's sessions
      description: Retrieve all chat sessions for the authenticated user.
      responses:
        '200':
          description: A list of chat sessions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSession'
        '401':
          description: Unauthorized
    post:
      summary: Create new session
      description: Initialize a new chat session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                system_context:
                  type: string
      responses:
        '201':
          description: Created chat session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
        '401':
          description: Unauthorized
  /api/chat/session/{sessionId}/messages:
    get:
      summary: Get chat history
      description: Retrieve the chronological message history for a specific session.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A list of messages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Session not found
  /api/chat/message:
    post:
      summary: Send message & receive AI reply
      description: Submit a new user message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - message
              properties:
                session_id:
                  type: string
                  format: uuid
                message:
                  type: string
      responses:
        '201':
          description: AI response message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Session not found
